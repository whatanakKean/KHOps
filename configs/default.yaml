# Default Configuration - Base settings inherited by all environments
# Use environment variables to override these values

# Server Configuration
SERVER_HOST: "0.0.0.0"
SERVER_PORT: 8000
MODEL_SERVER_HOST: "0.0.0.0"
MODEL_SERVER_PORT: 8001
MODEL_SERVER_PORT_STAGING: 8002
MODEL_SERVER_PORT_PRODUCTION: 8003
DEBUG: false
LOG_LEVEL: "INFO"

# Database Configuration
DATABASE_URL: "postgresql://khops:khops_dev@localhost:5432/khops"
DATABASE_ECHO: false
DATABASE_POOL_SIZE: 20
DATABASE_MAX_OVERFLOW: 0

# Redis Configuration
REDIS_URL: "redis://localhost:6379/0"
REDIS_PASSWORD: null
REDIS_DB: 0

# Storage Configuration
STORAGE_TYPE: "local"  # Options: "local", "s3"
STORAGE_PATH: "./data/artifacts"
AWS_ACCESS_KEY_ID: null
AWS_SECRET_ACCESS_KEY: null
AWS_REGION: "us-east-1"
AWS_S3_BUCKET: null

# Registry Configuration
REGISTRY_PATH: "./data/registry"
MODEL_REGISTRY_PATH: "./data/models"

# Pipeline Execution Configuration
PIPELINE_MAX_PARALLEL_NODES: 5
PIPELINE_TIMEOUT_SECONDS: 3600
EXECUTION_TIMEOUT_SECONDS: 3600
EXECUTION_MAX_RETRIES: 3
EXECUTION_RETRY_DELAY_SECONDS: 10

# Observability Configuration
OBSERVABILITY_ENABLED: true
METRICS_ENABLED: true
TRACES_ENABLED: false
LOGS_ENABLED: true

# Logging Configuration
LOG_TO_FILE: true
LOG_FILE_PATH: "./logs/khops.log"
LOG_MAX_BYTES: 10485760       # 10 MB
LOG_BACKUP_COUNT: 5

# Scheduler Configuration
SCHEDULER_ENABLED: true
SCHEDULER_TIMEZONE: "UTC"
SCHEDULER_POOL_SIZE: 5

# Security Configuration (Future)
AUTH_ENABLED: false
SECRET_KEY: "your-secret-key-change-in-production"
JWT_ALGORITHM: "HS256"
ACCESS_TOKEN_EXPIRE_MINUTES: 30
