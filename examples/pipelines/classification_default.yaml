name: default-classification
description: Default classification pipeline with standard settings
version: "1.0"

data:
  source_type: csv
  source_path: data/training_data.csv
  target_column: target
  feature_columns: null  # Use all features except target
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  stratified: true

preprocessing:
  handle_missing: true
  missing_strategy: mean
  remove_duplicates: true
  handle_outliers: false
  outlier_method: iqr
  encode_categorical: true
  encoding_method: onehot
  scale_features: true
  scaler_type: standard
  feature_selection: false
  feature_selection_method: variance
  n_features_to_select: null
  custom_steps: []

models:
  - id: rf_default
    model_type: random_forest
    hyperparameters:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5
      min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  - id: xgb_default
    model_type: xgboost
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  - id: lgb_default
    model_type: lightgbm
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.1
      num_leaves: 31
      feature_fraction: 0.8
      bagging_fraction: 0.8
    random_state: 42
    n_jobs: -1

evaluation:
  task_type: classification
  classification_metrics:
    - accuracy
    - f1
    - auc_roc
  validation_method: k_fold
  n_splits: 5
  primary_metric: f1
  threshold_optimization: false

ranking:
  ranking_method: best_primary_metric
  metric_weights: {}
  select_top_k: 1
  ensemble_method: null
  ensemble_voting_strategy: soft
  save_top_k_models: false

serving:
  serving_type: api
  api:
    enabled: true
    port: 8001
    max_workers: 4
    request_timeout: 30
    batch_prediction_timeout: 60
  batch:
    enabled: false
    schedule: daily
    input_format: csv
    output_format: csv
    max_batch_size: 10000
  model_cache_ttl: 3600
  enable_monitoring: true
  enable_drift_detection: true
