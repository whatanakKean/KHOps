# Sample pipeline configuration

name: sample_pipeline
description: Simple data-to-model pipeline
version: "1.0"

nodes:
  - id: data_load
    type: data
    params:
      source: "./examples/data/raw/training_data.csv"

  - id: data_prep
    type: data
    params:
      operations:
        - drop_nulls
        - normalize

  - id: model_train
    type: training
    params:
      algorithm: "random_forest"
      target: "target"
      n_estimators: 100
      max_depth: 10

  - id: model_eval
    type: evaluation
    params:
      target: "target"
      metrics:
        - accuracy
        - precision
        - recall

edges:
  - from: data_load
    to: data_prep

  - from: data_prep
    to: model_train

  - from: model_train
    to: model_eval
