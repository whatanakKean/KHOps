name: regression-house-prices
description: Regression pipeline for house price prediction
version: "1.0"

data:
  source_type: csv
  source_path: data/housing.csv
  target_column: price
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  stratified: false

preprocessing:
  handle_missing: true
  missing_strategy: median
  remove_duplicates: true
  handle_outliers: true
  outlier_method: iqr
  encode_categorical: true
  encoding_method: onehot
  scale_features: true
  scaler_type: standard
  feature_selection: true
  feature_selection_method: correlation
  n_features_to_select: 15

models:
  - id: rf_regression
    model_type: random_forest
    hyperparameters:
      n_estimators: 100
      max_depth: 15
      min_samples_split: 5
    n_jobs: -1

  - id: xgb_regression
    model_type: xgboost
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 6

  - id: lgb_regression
    model_type: lightgbm
    hyperparameters:
      n_estimators: 100
      learning_rate: 0.1
      num_leaves: 31

evaluation:
  task_type: regression
  regression_metrics:
    - rmse
    - mae
    - r2
  validation_method: k_fold
  n_splits: 5
  primary_metric: r2

ranking:
  ranking_method: best_primary_metric
  select_top_k: 1

serving:
  serving_type: api
  api:
    enabled: true
    port: 8001
    max_workers: 4
  enable_monitoring: true
  enable_drift_detection: false
