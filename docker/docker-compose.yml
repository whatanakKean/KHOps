version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: khops-postgres
    environment:
      POSTGRES_USER: khops
      POSTGRES_PASSWORD: khops_dev
      POSTGRES_DB: khops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - khops-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: khops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - khops-network

  # KHOps Server
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: khops-server
    command: uvicorn khops.server.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://khops:khops_dev@postgres:5432/khops
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      LOG_LEVEL: INFO
    volumes:
      - ..:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - khops-network

  # Prometheus (Optional - for metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: khops-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - khops-network

  # Loki (Optional - for logs)
  loki:
    image: grafana/loki:latest
    container_name: khops-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - khops-network

  # Grafana (Optional - for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: khops-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - khops-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  khops-network:
    driver: bridge
